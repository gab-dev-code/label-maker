<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Label Maker — CSV/Excel to printable PDF labels</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />

<!-- libs (cdnjs) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root{
    --paper:#EFEFE9;
    --panel:#FBFBF8;
    --ink:#16181A;
    --muted:#6A6E6B;
    --line:#DCDCD3;
    --line-strong:#C4C4B8;
    --accent:#1F44C8;
    --accent-ink:#12298a;
    --ok:#157347;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}

  header.masthead{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:16px;border-bottom:1.5px solid var(--ink);padding-bottom:14px;margin-bottom:8px;flex-wrap:wrap;
  }
  .brand{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;}
  .brand .mark{color:var(--accent);}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:28px;align-items:start;}
  @media (max-width:780px){.grid{grid-template-columns:1fr;gap:24px;}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .eyebrow .n{background:var(--ink);color:var(--paper);width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;font-weight:500;}

  /* source toggle */
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
  .seg button{font-family:"IBM Plex Mono",monospace;font-size:12px;padding:7px 14px;background:transparent;border:0;cursor:pointer;color:var(--muted);letter-spacing:0.04em;}
  .seg button.on{background:var(--ink);color:var(--paper);}

  .drop{display:block;border:1.5px dashed var(--line-strong);border-radius:var(--radius);padding:26px 16px;text-align:center;cursor:pointer;transition:border-color .15s;position:relative;}
  .drop::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;pointer-events:none;transition:opacity .15s;border-radius:var(--radius);}
  .drop:hover,.drop.drag{border-color:var(--accent);}
  .drop:hover::before,.drop.drag::before{opacity:0.06;}
  .drop:active::before{opacity:0.13;}
  .drop strong{display:block;font-weight:500;}
  .drop small{color:var(--muted);font-family:"IBM Plex Mono",monospace;font-size:11px;}
  input[type=file]{display:none;}

  textarea{width:100%;min-height:150px;border:1px solid var(--line-strong);border-radius:var(--radius);padding:12px;font-family:"IBM Plex Mono",monospace;font-size:13px;resize:vertical;background:#fff;color:var(--ink);}
  textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;}

  .filechip{margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:8px 10px;display:flex;justify-content:space-between;align-items:center;}
  .filechip button{background:none;border:0;color:var(--muted);cursor:pointer;font-size:13px;}

  .field{margin-top:16px;}
  .field > label{display:block;font-size:12px;font-weight:600;letter-spacing:0.02em;margin-bottom:6px;}
  .cols{display:flex;flex-wrap:wrap;gap:8px;}
  .col-pill{font-family:"IBM Plex Mono",monospace;font-size:12px;border:1px solid var(--line-strong);border-radius:20px;padding:5px 12px;cursor:pointer;user-select:none;background:#fff;color:var(--muted);}
  .col-pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  .check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--line);cursor:pointer;}
  .check input{accent-color:var(--accent);width:15px;height:15px;}

  .dims{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .dims .field{margin-top:0;}
  .imeasure{position:relative;}
  .imeasure input{width:100%;border:1px solid var(--line-strong);border-radius:var(--radius);padding:9px 38px 9px 11px;font-family:"IBM Plex Mono",monospace;font-size:14px;background:#fff;color:var(--ink);}
  .imeasure input:focus{outline:2px solid var(--accent);outline-offset:-1px;}
  .imeasure .unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);pointer-events:none;}

  .seg.small button{padding:6px 12px;}

  .txtinput{width:100%;border:1px solid var(--line-strong);border-radius:var(--radius);padding:9px 11px;font-family:"IBM Plex Mono",monospace;font-size:13px;background:#fff;color:var(--ink);}
  .txtinput:focus{outline:2px solid var(--accent);outline-offset:-1px;}

  /* preview / signature */
  .stage{position:relative;display:flex;align-items:center;justify-content:center;padding:34px 30px 16px;min-height:300px;}
  .dimtop,.dimside{font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);position:absolute;letter-spacing:0.04em;}
  .dimtop{top:12px;left:50%;transform:translateX(-50%);}
  .dimside{top:50%;right:8px;transform:translateY(-50%) rotate(90deg);transform-origin:center;}
  .sheet{
    background:#fff;border:1px solid var(--line-strong);
    box-shadow:0 1px 0 rgba(0,0,0,.04),0 10px 30px -18px rgba(0,0,0,.35);
    display:flex;flex-direction:column;
    overflow:hidden;word-break:break-word;
  }
  .sheet-main{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;}
  .sheet-main span{padding:4px;line-height:1.15;display:block;width:100%;white-space:pre-line;}
  .fieldrows{display:flex;flex-direction:column;width:100%;height:100%;padding:4px;}
  .fieldrow{flex:1;display:grid;grid-template-columns:2fr 3fr 2fr 3fr;column-gap:6px;align-items:center;min-height:0;}
  .fr-cap{color:var(--muted);white-space:pre-line;word-break:break-word;line-height:1.15;min-width:0;}
  .fr-val{font-weight:700;white-space:pre-line;word-break:break-word;min-width:0;line-height:1.15;}
  .fr-val.span3{grid-column:2 / 5;}
  .sheet-foot{flex:0 0 auto;display:flex;flex-direction:row;align-items:flex-end;justify-content:space-between;gap:8px;width:100%;}
  .foot-logo{height:80%;max-width:50%;object-fit:contain;}
  .foot-web{font-family:"IBM Plex Mono",monospace;color:var(--ink);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .corner{position:absolute;width:8px;height:8px;border:1px solid var(--line-strong);}

  .meta{display:flex;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px;margin-top:6px;}
  .meta b{color:var(--ink);font-weight:500;}
  .nav{display:flex;gap:6px;align-items:center;}
  .nav button{border:1px solid var(--line-strong);background:#fff;border-radius:3px;width:26px;height:24px;cursor:pointer;color:var(--ink);}
  .nav button:disabled{opacity:.35;cursor:default;}

  .cta{margin-top:20px;display:flex;gap:12px;align-items:center;}
  .btn{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;border:0;border-radius:var(--radius);padding:13px 22px;cursor:pointer;letter-spacing:-0.01em;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-ink);}
  .btn-primary:disabled{background:var(--line-strong);color:#fff;cursor:not-allowed;}
  .hint{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);}

  footer{margin-top:42px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.03em;}
  footer a{color:var(--muted);}
  .empty{color:var(--muted);font-style:italic;}
</style>
</head>

<body>
<div class="wrap" x-data="labelPress()" x-cloak>

  <header class="masthead">
    <div class="brand">Label<span class="mark">·</span>Maker</div>
    <div class="tag">csv / xlsx → print-ready pdf · type it in or upload a file</div>
  </header>

  <div class="grid">

    <!-- ============ CONTROLS ============ -->
    <section>
      <div class="panel">
        <div class="eyebrow"><span class="n">1</span> Source</div>

        <div class="seg">
          <button :class="src==='file' && 'on'" @click="src='file'">Upload file</button>
          <button :class="src==='paste' && 'on'" @click="src='paste'">Paste lines</button>
        </div>

        <template x-if="src==='file'">
          <div>
            <label class="drop" :class="dragging && 'drag'"
              @dragover.prevent="dragging=true" @dragleave.prevent="dragging=false"
              @drop.prevent="onDrop($event)">
              <input type="file" accept=".csv,.tsv,.xlsx,.xls" @change="onPick($event)" />
              <strong>Drop a CSV or Excel file here</strong>
              <small>or click to browse · .csv .xlsx .xls</small>
            </label>
            <template x-if="fileName">
              <div class="filechip">
                <span x-text="fileName + '  ·  ' + rows.length + ' rows'"></span>
                <button @click="clearData()" title="Remove">✕</button>
              </div>
            </template>
            <label class="check">
              <input type="checkbox" x-model="hasHeader" @change="reparse()" />
              First row is a header
            </label>
          </div>
        </template>

        <template x-if="src==='paste'">
          <div>
            <textarea x-model="pasted" @input="parsePaste()"
              placeholder="One label per line, e.g.&#10;Crate A-01&#10;Crate A-02&#10;Crate A-03"></textarea>
          </div>
        </template>

        <!-- column picker (file only, multi-column, simple layout only) -->
        <template x-if="layout==='simple' && src==='file' && columns.length>1">
          <div class="field">
            <label>Columns to print <span class="hint">(stacked, top to bottom)</span></label>
            <div class="cols">
              <template x-for="(c,i) in columns" :key="i">
                <span class="col-pill" :class="selected.includes(i) && 'on'" @click="toggleCol(i)" x-text="c"></span>
              </template>
            </div>
          </div>
        </template>

        <!-- project label hint -->
        <template x-if="layout==='fields'">
          <p class="hint" style="margin-top:10px;line-height:1.4;">
            <template x-if="src==='file'">
              <span>Columns fill the fields in order, left to right: <span x-text="fieldLabels.join(', ')"></span>.</span>
            </template>
            <template x-if="src==='paste'">
              <span>Separate labels with a blank line. Within each block, lines fill the fields in order: <span x-text="fieldLabels.join(', ')"></span>.</span>
            </template>
          </p>
        </template>

        <!-- grouping: how rows become pages (simple layout only) -->
        <template x-if="layout==='simple'">
          <div class="field">
            <label>Group rows into labels <span class="hint">— how pages are split</span></label>
            <div class="seg small" style="flex-wrap:wrap;">
              <button :class="groupMode==='single' && 'on'" @click="setGroup('single')">One row each</button>
              <button :class="groupMode==='blank' && 'on'" @click="setGroup('blank')">Blank row = break</button>
              <button x-show="src==='file'" :class="groupMode==='column' && 'on'" @click="setGroup('column')">By column</button>
            </div>
            <template x-if="groupMode==='column' && src==='file'">
              <select x-model.number="groupCol" @change="idx=0"
                style="width:100%;margin-top:10px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--radius);font-family:'IBM Plex Mono',monospace;font-size:13px;background:#fff;color:var(--ink);">
                <template x-for="(c,i) in columns" :key="i">
                  <option :value="i" x-text="'Group by: '+c"></option>
                </template>
              </select>
            </template>
            <p class="hint" x-show="groupMode==='blank'" style="margin:8px 0 0;line-height:1.4;">
              Leave an empty row in your file (or a blank line when pasting) wherever the next label should start.
            </p>
          </div>
        </template>
      </div>

      <div class="panel" style="margin-top:20px;">
        <div class="eyebrow"><span class="n">2</span> Label spec</div>

        <div class="dims">
          <div class="field">
            <label>Width</label>
            <div class="imeasure"><input type="number" min="1" step="1" x-model.number="w" /><span class="unit">mm</span></div>
          </div>
          <div class="field">
            <label>Height</label>
            <div class="imeasure"><input type="number" min="1" step="1" x-model.number="h" /><span class="unit">mm</span></div>
          </div>
        </div>

        <div class="dims" style="margin-top:14px;">
          <div class="field">
            <label>Font size</label>
            <div class="imeasure"><input type="number" min="4" step="1" x-model.number="fontSize" /><span class="unit">pt</span></div>
          </div>
          <div class="field">
            <label>Inner margin</label>
            <div class="imeasure"><input type="number" min="0" step="1" x-model.number="margin" /><span class="unit">mm</span></div>
          </div>
        </div>

        <div class="field">
          <label>Alignment</label>
          <div class="seg small">
            <button :class="align==='left' && 'on'" @click="align='left'">Left</button>
            <button :class="align==='center' && 'on'" @click="align='center'">Center</button>
            <button :class="align==='right' && 'on'" @click="align='right'">Right</button>
          </div>
        </div>

        <div class="field">
          <label>Layout</label>
          <div class="seg small">
            <button :class="layout==='simple' && 'on'" @click="layout='simple'">Simple text</button>
            <button :class="layout==='fields' && 'on'" @click="layout='fields'">Project label</button>
          </div>
        </div>
      </div>

    </section>

    <!-- ============ PREVIEW + EXPORT ============ -->
    <section>
      <div class="panel">
        <div class="eyebrow"><span class="n">3</span> Preview</div>

        <div class="stage">
          <div class="dimtop" x-text="w + ' mm'"></div>
          <div class="dimside" x-text="h + ' mm'"></div>
          <div class="sheet" :style="sheetStyle()">
            <div class="sheet-main">
              <template x-if="layout==='simple'">
                <span :style="textStyle()" x-text="currentText() || '—'" :class="!currentText() && 'empty'"></span>
              </template>
              <template x-if="layout==='fields'">
                <div class="fieldrows">
                  <template x-for="(row,ri) in fieldRowsWithValues()" :key="ri">
                    <div class="fieldrow" :style="fieldRowGridStyle()">
                      <span class="fr-cap" :style="capStyle()" x-text="row.cap1+':'"></span>
                      <span class="fr-val" :class="!row.split && 'span3'" :style="valStyle(row.val1Pt)" x-text="row.val1"></span>
                      <template x-if="row.split">
                        <span class="fr-cap" :style="capStyle()" x-text="row.cap2+':'"></span>
                      </template>
                      <template x-if="row.split">
                        <span class="fr-val" :style="valStyle(row.val2Pt)" x-text="row.val2"></span>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
            <div class="sheet-foot" x-show="hasFooter()" :style="footStyle()">
              <img x-show="logoData" :src="logoData" class="foot-logo" alt="" />
              <div x-show="website && website.trim()" class="foot-web" :style="footWebStyle()" x-text="website"></div>
            </div>
          </div>
        </div>

        <div class="meta">
          <div class="nav">
            <button @click="prev()" :disabled="pageCount<2">‹</button>
            <span x-text="pageCount ? (idx+1)+' / '+pageCount : '0 / 0'"></span>
            <button @click="next()" :disabled="pageCount<2">›</button>
          </div>
          <div><b x-text="rows.length"></b> rows → <b x-text="pageCount"></b> page<span x-show="pageCount!==1">s</span></div>
        </div>
      </div>

      <div class="cta">
        <button class="btn btn-primary" @click="generate()" :disabled="!pageCount || busy"
          x-text="busy ? 'Building…' : 'Download PDF'"></button>
        <span class="hint" x-show="pageCount" x-text="w+'×'+h+' mm · one label per page'"></span>
      </div>
    </section>
  </div>

</div>

<script>
function labelPress(){
  return {
    src:'file', dragging:false,
    fileName:'', hasHeader:true,
    rows:[], rowsRaw:[], columns:[], selected:[0],
    rawAOA:[],            // array-of-arrays from last parse (for header re-toggle)
    pasted:'',
    groupMode:'single', groupCol:0,
    w:152, h:102, fontSize:32, margin:4, align:'left',
    layout:'simple',
    fieldRows:[
      {caps:['Project']},
      {caps:['Delivery','Package']},
      {caps:['Roof']},
      {caps:['Panel','Qty.']},
      {caps:['Weight']},
    ],
    logoData:null, logoAspect:1, website:'solarix-solar.com', footerH:12, footFont:18,
    idx:0, busy:false,

    // ---------- init ----------
    init(){
      const img=new Image();
      img.onload=()=>{
        const nw=img.naturalWidth||img.width, nh=img.naturalHeight||img.height;
        const cv=document.createElement('canvas'); cv.width=nw; cv.height=nh;
        cv.getContext('2d').drawImage(img,0,0,nw,nh);
        this.logoData=cv.toDataURL('image/png');
        this.logoAspect=nw/nh;
      };
      img.src='logo.png';
    },

    // ---------- file input ----------
    onPick(e){ const f=e.target.files[0]; if(f) this.readFile(f); },
    onDrop(e){ this.dragging=false; const f=e.dataTransfer.files[0]; if(f) this.readFile(f); },

    readFile(file){
      this.fileName=file.name;
      const ext=file.name.split('.').pop().toLowerCase();
      if(ext==='xlsx'||ext==='xls'){
        const r=new FileReader();
        r.onload=ev=>{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          this.rawAOA=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:true,defval:''});
          this.applyAOA();
        };
        r.readAsArrayBuffer(file);
      } else {
        Papa.parse(file,{skipEmptyLines:false,complete:res=>{
          this.rawAOA=res.data; this.applyAOA();
        }});
      }
    },

    isBlank(r){ return !r || !r.length || r.every(c=>c==null||String(c).trim()===''); },

    applyAOA(){
      let data=this.rawAOA.slice();
      while(data.length && this.isBlank(data[0])) data.shift();          // trim leading blanks
      while(data.length && this.isBlank(data[data.length-1])) data.pop();// trim trailing blanks
      if(!data.length){ this.clearData(); return; }
      let body;
      if(this.hasHeader){
        this.columns=data[0].map((c,i)=>String(c).trim()||('Col '+(i+1)));
        body=data.slice(1);
      } else {
        this.columns=data[0].map((_,i)=>'Col '+(i+1));
        body=data;
      }
      this.rowsRaw=body;                                  // keeps internal blanks (separators)
      this.rows=body.filter(r=>!this.isBlank(r));         // clean rows for display
      this.selected=this.columns.map((_,i)=>i);
      this.idx=0;
    },
    reparse(){ if(this.rawAOA.length) this.applyAOA(); },

    clearData(){ this.fileName=''; this.rows=[]; this.rowsRaw=[]; this.columns=[]; this.rawAOA=[]; this.selected=[0]; this.idx=0; },

    // ---------- paste input ----------
    parsePaste(){
      let lines=this.pasted.split(/\r?\n/);
      while(lines.length && lines[0].trim()==='') lines.shift();
      while(lines.length && lines[lines.length-1].trim()==='') lines.pop();
      this.rowsRaw=lines.map(l=>[l]);
      this.rows=this.rowsRaw.filter(r=>r[0].trim()!=='');
      this.columns=['Line']; this.selected=[0]; this.idx=0;
    },

    setGroup(m){ this.groupMode=m; this.idx=0; },

    toggleCol(i){
      if(this.selected.includes(i)) this.selected=this.selected.filter(x=>x!==i);
      else this.selected=[...this.selected,i].sort((a,b)=>a-b);
      if(!this.selected.length) this.selected=[i];
    },

    // ---------- logo ----------
    onLogo(e){ const f=e.target.files[0]; if(f) this.loadLogo(f); },
    loadLogo(file){
      this.logoName=file.name;
      const url=URL.createObjectURL(file);
      const img=new Image();
      img.onload=()=>{
        let nw=img.naturalWidth||img.width, nh=img.naturalHeight||img.height;
        if(!nw||!nh){ nw=800; nh=800; }          // SVG with no intrinsic size
        const targetW=Math.max(nw,700);           // upscale small art for crisp print
        const s=targetW/nw, cw=Math.round(nw*s), ch=Math.round(nh*s);
        const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        cv.getContext('2d').drawImage(img,0,0,cw,ch);
        this.logoData=cv.toDataURL('image/png');  // PNG keeps transparency
        this.logoAspect=nw/nh;
        URL.revokeObjectURL(url);
      };
      img.onerror=()=>{ URL.revokeObjectURL(url); this.logoName=''; alert('Could not read that image file.'); };
      img.src=url;
    },
    clearLogo(){ this.logoData=null; this.logoName=''; this.logoAspect=1; },

    // ---------- grouping ----------
    rowToLines(r){
      const cols=this.src==='paste'?[0]:(this.selected.length?this.selected:[0]);
      return cols.map(i=>(r[i]!=null?String(r[i]):'').trim()).filter(Boolean);
    },
    get effectiveGroupMode(){
      if(this.layout==='fields') return this.src==='paste' ? 'blank' : 'single';
      return this.groupMode;
    },
    get groups(){
      const mode=this.effectiveGroupMode;
      if(mode==='blank'){
        const out=[]; let cur=[];
        (this.rowsRaw||[]).forEach(r=>{
          if(this.isBlank(r)){ if(cur.length){out.push(cur);cur=[];} }
          else cur.push(r);
        });
        if(cur.length) out.push(cur);
        return out;
      }
      if(mode==='column'){
        const map=new Map(), order=[];
        this.rows.forEach(r=>{
          const key=String(r[this.groupCol]!=null?r[this.groupCol]:'').trim();
          if(!map.has(key)){ map.set(key,[]); order.push(key); }
          map.get(key).push(r);
        });
        return order.map(k=>map.get(k));
      }
      return this.rows.map(r=>[r]);   // one row per label
    },

    // ---------- label text (simple layout) ----------
    get labels(){
      return this.groups
        .map(g=>g.flatMap(r=>this.rowToLines(r)).join('\n'))
        .filter(t=>t!=='');
    },
    currentText(){ const L=this.labels; if(!L.length) return ''; return L[Math.min(this.idx,L.length-1)] ?? ''; },

    // ---------- field values (project label layout) ----------
    // positional: 1st value -> Project, 2nd -> Delivery, 3rd -> Package, etc.
    get fieldLabels(){ return this.fieldRows.flatMap(r=>r.caps); },
    fieldValues(g){
      const arr=this.src==='paste' ? g.map(r=>r&&r[0]) : (g[0]||[]);
      return this.fieldLabels.map((_,i)=>(arr[i]!=null?String(arr[i]).trim():''));
    },
    // a Roof value like "N3-1/O1-3/S4-3/W1-2" means this package is split across
    // several roofs; expand it into one label per "Code-Qty" entry, overriding
    // Roof and Qty. while the rest of the row's fields stay the same.
    splitRoofEntries(values){
      const ri=this.fieldLabels.indexOf('Roof'), qi=this.fieldLabels.indexOf('Qty.');
      const roof=values[ri]||'';
      if(ri<0 || qi<0 || !roof.includes('/')) return [values];
      return roof.split('/').map(entry=>{
        entry=entry.trim();
        const cut=entry.lastIndexOf('-');
        const code=cut<0?entry:entry.slice(0,cut), qty=cut<0?'':entry.slice(cut+1);
        const v=values.slice();
        v[ri]=code.trim(); v[qi]=qty.trim();
        return v;
      });
    },
    get fieldGroups(){
      return this.groups
        .map(g=>this.fieldValues(g))
        .filter(arr=>arr.some(v=>v!==''))
        .flatMap(arr=>this.splitRoofEntries(arr));
    },
    currentFieldValues(){
      const G=this.fieldGroups; if(!G.length) return this.fieldLabels.map(()=>'');
      return G[Math.min(this.idx,G.length-1)] ?? this.fieldLabels.map(()=>'');
    },
    fieldRowsWithValues(){
      const vals=this.currentFieldValues();
      const cols=this.fieldColsMm(), rowH=this.fieldRowHmm();
      let i=0;
      return this.fieldRows.map(row=>{
        const split=row.caps.length===2;
        const cap1=row.caps[0], val1=vals[i++]||'';
        const cap2=split?row.caps[1]:null, val2=split?(vals[i++]||''):null;
        const val1BoxW=split?cols.val1W:(cols.val1W+cols.gap+cols.cap2W+cols.gap+cols.val2W);
        const val1Pt=this.fitValueFontPreview(val1,val1BoxW,rowH,this.fontSize).pt;
        const val2Pt=split?this.fitValueFontPreview(val2,cols.val2W,rowH,this.fontSize).pt:null;
        return { split, cap1, val1, cap2, val2, val1Pt, val2Pt };
      });
    },

    // ---------- pagination (shared) ----------
    get pageCount(){ return this.layout==='fields' ? this.fieldGroups.length : this.labels.length; },
    next(){ if(this.idx<this.pageCount-1) this.idx++; },
    prev(){ if(this.idx>0) this.idx--; },

    // ---------- preview scaling ----------
    previewDims(){
      const maxW=240, maxH=300, ratio=this.w/this.h;
      let pw=maxW, ph=maxW/ratio;
      if(ph>maxH){ ph=maxH; pw=maxH*ratio; }
      return { pw, ph, pxPerMm: pw/this.w };
    },
    hasFooter(){ return !!(this.logoData || (this.website && this.website.trim())); },
    sheetStyle(){
      const d=this.previewDims();
      return `width:${d.pw}px;height:${d.ph}px;padding:${this.margin*d.pxPerMm}px;`;
    },
    textStyle(){
      const d=this.previewDims();
      const px=this.fontSize*0.3528*d.pxPerMm;   // pt→mm→px
      return `font-size:${px}px;text-align:${this.align};`;
    },
    footStyle(){
      const d=this.previewDims();
      return `height:${this.footerH*d.pxPerMm}px;`;
    },
    footWebStyle(){
      const d=this.previewDims();
      return `font-size:${this.footFont*0.3528*d.pxPerMm}px;`;
    },
    capStyle(){
      const d=this.previewDims();
      const px=Math.max(6,this.fontSize*0.35)*0.3528*d.pxPerMm;
      return `font-size:${px}px;text-align:left;`;
    },
    valStyle(ptOverride){
      const d=this.previewDims();
      const pt=ptOverride||this.fontSize;
      const px=pt*0.3528*d.pxPerMm;
      return `font-size:${px}px;text-align:${this.align};`;
    },

    // ---------- shared field-layout geometry (mm) ----------
    // column-width ratio, in order: cap1, val1, cap2, val2 — edit these 4 numbers to resize columns.
    fieldColRatio:[1.8,4,1.8,2.4],
    fieldColsMm(){
      const maxW=this.w-2*this.margin, gap=3, usableW=maxW-gap*3;
      const total=this.fieldColRatio.reduce((a,b)=>a+b,0), unit=usableW/total;
      const [cap1W,val1W,cap2W,val2W]=this.fieldColRatio.map(r=>r*unit);
      return { maxW, gap, cap1W, val1W, cap2W, val2W };
    },
    fieldRowGridStyle(){
      const [c1,v1,c2,v2]=this.fieldColRatio;
      return `grid-template-columns:${c1}fr ${v1}fr ${c2}fr ${v2}fr;`;
    },
    fieldRowHmm(){
      const footerH=this.hasFooter()?this.footerH:0;
      return (this.h - 2*this.margin - footerH)/5;
    },

    // ---------- auto-shrink value text to fit its box (preview, canvas-measured) ----------
    measureCtx(){
      if(!this._mctx) this._mctx=document.createElement('canvas').getContext('2d');
      return this._mctx;
    },
    wrapLines(ctx,text,maxWidthPx){
      const lines=[];
      String(text).split('\n').forEach(para=>{
        const words=para.split(' ');
        let line='';
        words.forEach(w=>{
          const test=line?line+' '+w:w;
          if(!line || ctx.measureText(test).width<=maxWidthPx) line=test;
          else { lines.push(line); line=w; }
        });
        lines.push(line);
      });
      return lines;
    },
    fitValueFontPreview(text,boxWmm,rowHmm,basePt,minPt=6){
      if(!text) return { pt:basePt, lines:[] };
      const ctx=this.measureCtx(), scale=10, boxWpx=boxWmm*scale;
      let pt=basePt;
      while(pt>minPt){
        ctx.font=`bold ${pt*0.3528*scale}px Arial`;
        const lines=this.wrapLines(ctx,text,boxWpx);
        const lhMm=pt*0.3528*1.15;
        if(lines.length*lhMm<=rowHmm*0.9) return { pt, lines };
        pt-=0.5;
      }
      ctx.font=`bold ${minPt*0.3528*scale}px Arial`;
      return { pt:minPt, lines:this.wrapLines(ctx,text,boxWpx) };
    },

    // ---------- auto-shrink value text to fit its box (PDF export, jsPDF-measured) ----------
    fitValueFontPdf(doc,text,boxW,rowH,basePt,minPt=6){
      if(!text) return { pt:basePt, lines:[] };
      let pt=basePt;
      while(pt>minPt){
        doc.setFontSize(pt);
        const lines=doc.splitTextToSize(text,boxW);
        const lhMm=pt*0.3528*1.15;
        if(lines.length*lhMm<=rowH*0.9) return { pt, lines };
        pt-=0.5;
      }
      doc.setFontSize(minPt);
      return { pt:minPt, lines:doc.splitTextToSize(text,boxW) };
    },

    // ---------- PDF export ----------
    drawFooter(doc,footerTop,footerH,maxW,web){
      if(!this.hasFooter()) return;
      doc.setFont('helvetica','normal');
      doc.setTextColor(22,24,26);
      const centerY = footerTop + footerH/2;
      if(this.logoData && web){
        // logo bottom-left
        let lh=footerH*0.8, lw=lh*this.logoAspect;
        if(lw>maxW/2-4){ lw=maxW/2-4; lh=lw/this.logoAspect; }
        doc.addImage(this.logoData,'PNG',this.margin,footerTop+footerH-lh,lw,lh);
        // text bottom-right
        doc.setFontSize(this.footFont);
        doc.text(web,this.w-this.margin,this.h-this.margin,{align:'right',baseline:'bottom'});
      } else if(this.logoData){
        let lh=footerH*0.8, lw=lh*this.logoAspect;
        if(lw>maxW){ lw=maxW; lh=lw/this.logoAspect; }
        doc.addImage(this.logoData,'PNG',(this.w-lw)/2,centerY-lh/2,lw,lh);
      } else if(web){
        doc.setFontSize(this.footFont);
        doc.text(web,this.w/2,centerY,{align:'center',baseline:'middle'});
      }
    },
    generate(){
      if(!this.pageCount) return;
      this.busy=true;
      try{
        const { jsPDF }=window.jspdf;
        const orient=this.w>this.h?'landscape':'portrait';
        const doc=new jsPDF({unit:'mm',orientation:orient,format:[this.w,this.h]});

        const footerH = this.hasFooter() ? this.footerH : 0;
        const footerTop = this.h - this.margin - footerH;     // y where footer band starts
        const areaTop = this.margin, areaBot = footerTop;      // main region above footer
        const maxW=this.w-2*this.margin;
        const web=(this.website||'').trim();

        if(this.layout==='fields'){
          // fixed 4-column grid (cap1, val1, cap2, val2) shared by every row, ratio 2:3:2:3,
          // so value-1 always starts at the same x whether or not a row is split.
          const cols=this.fieldColsMm(), gap=cols.gap;
          const cap1X=this.margin;
          const val1X=cap1X+cols.cap1W+gap;
          const cap2X=val1X+cols.val1W+gap;
          const val2X=cap2X+cols.cap2W+gap;
          const rowRight=this.margin+maxW;

          const capFontPt=Math.max(6,this.fontSize*0.35);
          const rowH=this.fieldRowHmm();

          const drawVal=(text,boxX,boxRight,rowMid)=>{
            if(!text) return;
            doc.setFont('helvetica','bold');
            doc.setTextColor(22,24,26);
            const boxW=boxRight-boxX;
            const {pt,lines}=this.fitValueFontPdf(doc,text,boxW,rowH,this.fontSize);
            const lhMm=pt*0.3528*1.15;
            const x=this.align==='center'?(boxX+boxW/2):(this.align==='right'?boxRight:boxX);
            const blockH=lines.length*lhMm;
            const y=rowMid-blockH/2+lhMm*0.78;
            doc.text(lines,x,y,{align:this.align,baseline:'alphabetic'});
          };
          const drawCap=(text,x,rowMid)=>{
            doc.setFont('helvetica','normal');
            doc.setFontSize(capFontPt);
            doc.setTextColor(106,110,107);
            doc.text(text+':',x,rowMid,{align:'left',baseline:'middle'});
          };

          this.fieldGroups.forEach((vals,gi)=>{
            if(gi>0) doc.addPage([this.w,this.h],orient);
            let vi=0;

            this.fieldRows.forEach((row,ri)=>{
              const rowMid=areaTop+rowH*ri+rowH/2;
              const split=row.caps.length===2;

              drawCap(row.caps[0],cap1X,rowMid);
              if(split){
                drawVal(vals[vi++]||'',val1X,cap2X-gap,rowMid);
                drawCap(row.caps[1],cap2X,rowMid);
                drawVal(vals[vi++]||'',val2X,rowRight,rowMid);
              } else {
                drawVal(vals[vi++]||'',val1X,rowRight,rowMid);
              }
            });

            this.drawFooter(doc,footerTop,footerH,maxW,web);
          });
        } else {
          const lhMm=this.fontSize*0.3528*1.15;
          const x=this.align==='center'?this.w/2:(this.align==='right'?this.w-this.margin:this.margin);

          this.labels.forEach((text,i)=>{
            if(i>0) doc.addPage([this.w,this.h],orient);

            // main text, vertically centered in the area above the footer
            doc.setFont('helvetica','normal');
            doc.setFontSize(this.fontSize);
            doc.setTextColor(22,24,26);
            const lines=doc.splitTextToSize(text,maxW);
            const blockH=lines.length*lhMm;
            const y=areaTop + ((areaBot-areaTop)-blockH)/2 + lhMm*0.78;
            doc.text(lines,x,y,{align:this.align,baseline:'alphabetic'});

            this.drawFooter(doc,footerTop,footerH,maxW,web);
          });
        }
        doc.save('labels.pdf');
      } finally { this.busy=false; }
    },
  };
}
</script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<style>[x-cloak]{display:none!important;}</style>
</body>
